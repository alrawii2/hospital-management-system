# ---------------------------------------------------------------------------
# Hospital Management System — Phase 2 deployment
#
#   docker compose up --build         # first run (builds images)
#   docker compose up -d              # subsequent runs
#   docker compose down               # stop everything
#   docker compose down -v            # stop and DROP the database
#
# Services:
#   db        — PostgreSQL 15 (volume-backed)
#   redis     — Redis 7 for cache / DRF throttling
#   backend   — Django 5 + Gunicorn, exposed only inside the docker network
#   frontend  — Nginx serving the React build and reverse-proxying /api/* to backend
#
# Ports exposed on the host:
#   80   -> frontend (Nginx, public)
#   8000 -> backend  (only in dev profile)
# ---------------------------------------------------------------------------

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-hms}
      POSTGRES_USER:     ${POSTGRES_USER:-hms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - hms_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hms_user} -d ${POSTGRES_DB:-hms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hms_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - hms_redis_data:/data
    networks:
      - hms_net

  backend:
    build:
      context: .
      dockerfile: deployment/Dockerfile.backend
    restart: unless-stopped
    environment:
      # Django
      DJANGO_SECRET_KEY:        ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set in .env}
      DJANGO_DEBUG:             "0"
      DJANGO_ALLOWED_HOSTS:     ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      FIELD_ENCRYPTION_KEY:     ${FIELD_ENCRYPTION_KEY:?FIELD_ENCRYPTION_KEY must be set in .env}
      # Database (read in settings.py via env)
      POSTGRES_DB:              ${POSTGRES_DB:-hms}
      POSTGRES_USER:            ${POSTGRES_USER:-hms_user}
      POSTGRES_PASSWORD:        ${POSTGRES_PASSWORD}
      POSTGRES_HOST:            db
      POSTGRES_PORT:            "5432"
      # Cache / Redis
      REDIS_URL:                redis://redis:6379/0
      # Optional one-shot seeding on first boot
      HMS_SEED_ON_START:        ${HMS_SEED_ON_START:-0}
    volumes:
      - hms_static:/app/staticfiles
      - hms_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hms_net
    # In production, do not expose the backend port to the host — only Nginx talks to it.
    # Uncomment for development access to the API directly:
    # ports:
    #   - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: deployment/Dockerfile.frontend
      args:
        # Empty so the React build uses same-origin "/api/..."
        VITE_API_BASE: ""
    restart: unless-stopped
    ports:
      - "${HMS_PUBLIC_PORT:-80}:80"
    volumes:
      # Mount the shared static volume so Nginx can serve Django admin static too.
      - hms_static:/usr/share/nginx/html/static:ro
    depends_on:
      - backend
    networks:
      - hms_net

networks:
  hms_net:
    driver: bridge

volumes:
  hms_db_data:
  hms_redis_data:
  hms_static:
  hms_media:
