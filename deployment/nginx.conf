# ---------------------------------------------------------------------------
# Nginx config for the Hospital Management System frontend container.
# Serves the React SPA static build and reverse-proxies API calls.
# ---------------------------------------------------------------------------

# Upstream backend (resolved on the docker compose network)
upstream hms_backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen      80;
    server_name _;

    # Security headers — quick wins; CSP can be tightened later.
    add_header X-Frame-Options          "DENY"                 always;
    add_header X-Content-Type-Options   "nosniff"              always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/xml+rss text/javascript;

    # --- API: reverse-proxy to Django backend ---
    location /api/ {
        proxy_pass         http://hms_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # --- Django admin (so the team can manage users in prod too) ---
    location /admin/ {
        proxy_pass         http://hms_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Django static (admin CSS/JS, DRF browsable API) ---
    location /static/ {
        proxy_pass         http://hms_backend;
        proxy_set_header   Host              $host;
        expires            7d;
        add_header         Cache-Control     "public";
    }

    # --- React static assets with aggressive caching ---
    location /assets/ {
        root                /usr/share/nginx/html;
        expires             1y;
        add_header          Cache-Control "public, immutable";
        try_files           $uri =404;
    }

    # --- SPA fallback: any other path returns index.html so React Router
    #     (or our internal page state) can handle it ---
    location / {
        root        /usr/share/nginx/html;
        try_files   $uri $uri/ /index.html;
    }
}
